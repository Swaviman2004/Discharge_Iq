version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: discharge_iq_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dischargeiq123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-discharge_iq}
      MYSQL_USER: ${MYSQL_USER:-discharge_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-discharge_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - discharge_iq_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: discharge_iq_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-discharge_iq}
      MYSQL_USER: ${MYSQL_USER:-discharge_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-discharge_pass}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - discharge_iq_network
    volumes:
      - ./backend/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: discharge_iq_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - discharge_iq_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
    driver: local

networks:
  discharge_iq_network:
    driver: bridge
